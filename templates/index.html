<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Todo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --sage: #7A9E7E;
    --sage-dark: #4A7050;
    --sage-light: #B8D4BB;
    --ink: #2A2A2A;
    --ink-muted: #6B6B6B;
    --warm: #C9956A;
    --warm-light: #EDD9C5;
    --paper: #FDFAF4;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background-color: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ── Background pattern ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 39px,
        rgba(122, 158, 126, 0.12) 39px,
        rgba(122, 158, 126, 0.12) 40px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 39px,
        rgba(122, 158, 126, 0.06) 39px,
        rgba(122, 158, 126, 0.06) 40px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* ── Floating cards ── */
  .cards-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .float-card {
    position: absolute;
    background: var(--paper);
    border-radius: 10px;
    border: 1.5px solid rgba(122,158,126,0.25);
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    animation: floatUp 18s ease-in-out infinite;
    box-shadow: 0 4px 20px rgba(74, 112, 80, 0.08);
  }

  .float-card .line {
    height: 8px;
    border-radius: 4px;
    background: var(--sage-light);
    opacity: 0.6;
  }

  .float-card .check {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 2px solid var(--sage);
    display: inline-block;
    flex-shrink: 0;
  }

  .float-card .check.done {
    background: var(--sage);
    border-color: var(--sage);
    position: relative;
  }

  .float-card .check.done::after {
    content: '';
    position: absolute;
    top: 1px; left: 3px;
    width: 6px; height: 10px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  .float-card .row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  @keyframes floatUp {
    0%   { transform: translateY(60px) rotate(var(--rot)); opacity: 0; }
    10%  { opacity: 0.55; }
    80%  { opacity: 0.4; }
    100% { transform: translateY(-120px) rotate(var(--rot)); opacity: 0; }
  }

  .float-card:nth-child(1)  { width: 160px; left: 4%;  bottom: 5%;  --rot: -4deg;  animation-delay: 0s;   animation-duration: 20s; }
  .float-card:nth-child(2)  { width: 200px; left: 18%; bottom: -10%; --rot: 2deg;  animation-delay: 3s;   animation-duration: 22s; }
  .float-card:nth-child(3)  { width: 140px; left: 38%; bottom: 0%;   --rot: -2deg; animation-delay: 1s;   animation-duration: 19s; }
  .float-card:nth-child(4)  { width: 180px; left: 60%; bottom: 8%;   --rot: 5deg;  animation-delay: 5s;   animation-duration: 24s; }
  .float-card:nth-child(5)  { width: 160px; left: 78%; bottom: -5%;  --rot: -3deg; animation-delay: 2s;   animation-duration: 21s; }
  .float-card:nth-child(6)  { width: 130px; left: 90%; bottom: 15%;  --rot: 3deg;  animation-delay: 7s;   animation-duration: 18s; }
  .float-card:nth-child(7)  { width: 190px; left: 50%; bottom: -15%; --rot: -5deg; animation-delay: 9s;   animation-duration: 23s; }
  .float-card:nth-child(8)  { width: 150px; left: 10%; bottom: -20%; --rot: 4deg;  animation-delay: 11s;  animation-duration: 20s; }

  /* ── Layout ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  /* ── Tag ── */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(122,158,126,0.15);
    border: 1px solid rgba(122,158,126,0.35);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 400;
    color: var(--sage-dark);
    letter-spacing: 0.04em;
    margin-bottom: 2rem;
    animation: fadeDown 0.8s ease both;
  }

  .tag .dot {
    width: 7px; height: 7px;
    background: var(--sage);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── Headline ── */
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(3.5rem, 9vw, 7rem);
    line-height: 1.0;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 1.2rem;
    animation: fadeDown 0.9s 0.1s ease both;
  }

  h1 em {
    font-style: italic;
    color: var(--sage-dark);
  }

  /* ── Subtitle ── */
  .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    font-weight: 300;
    color: var(--ink-muted);
    max-width: 460px;
    line-height: 1.6;
    margin-bottom: 3rem;
    animation: fadeDown 1s 0.2s ease both;
  }

  /* ── Stats row ── */
  .stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 3rem;
    animation: fadeDown 1s 0.3s ease both;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat strong {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    color: var(--sage-dark);
  }

  .stat span {
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .divider {
    width: 1px;
    height: 40px;
    background: rgba(122,158,126,0.3);
    align-self: center;
  }

  /* ── Button ── */
  .btn-group {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeDown 1s 0.4s ease both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--sage-dark);
    color: #fff;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
    transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 6px 24px rgba(74,112,80,0.25);
  }

  .btn-primary:hover {
    background: var(--sage);
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(74,112,80,0.3);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-primary .arrow {
    width: 18px;
    height: 18px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: transform 0.2s ease;
  }

  .btn-primary:hover .arrow { transform: translateX(3px); }

  /* ── Pill features ── */
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 3.5rem;
    animation: fadeDown 1s 0.5s ease both;
  }

  .pill {
    background: var(--paper);
    border: 1px solid rgba(122,158,126,0.3);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .pill-icon {
    width: 18px; height: 18px;
    background: var(--sage-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  /* ── Corner deco ── */
  .corner-deco {
    position: fixed;
    z-index: 0;
    pointer-events: none;
  }

  .corner-deco.tl {
    top: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(122,158,126,0.15) 0%, transparent 70%);
  }

  .corner-deco.br {
    bottom: -100px; right: -100px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,149,106,0.12) 0%, transparent 70%);
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Footer ── */
  footer {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--ink-muted);
    z-index: 2;
    opacity: 0.6;
    white-space: nowrap;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .stats { gap: 1rem; }
    .divider { display: none; }
    .btn-primary { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="corner-deco tl"></div>
